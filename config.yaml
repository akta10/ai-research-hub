project:
  name: ai-research-hub
  version: 1.0.0
  description: "Multi-model AI research assistant for automated paper analysis, code generation, and knowledge synthesis"
  author: akta10

models:
  providers:
    - name: anthropic
      models:
        - id: claude-haiku-4.5
          name: Claude Haiku 4.5
          cost_per_1k_input: 0.0008
          cost_per_1k_output: 0.004
          max_tokens: 200000
          use_case: "Fast analysis, summarization"
        - id: claude-sonnet-4
          name: Claude Sonnet 4
          cost_per_1k_input: 0.003
          cost_per_1k_output: 0.015
          max_tokens: 200000
          use_case: "Deep analysis, complex reasoning"

    - name: openai
      models:
        - id: gpt-4o
          name: GPT-4o
          cost_per_1k_input: 0.0025
          cost_per_1k_output: 0.01
          max_tokens: 128000
          use_case: "Code generation, multimodal"
        - id: gpt-4o-mini
          name: GPT-4o Mini
          cost_per_1k_input: 0.00015
          cost_per_1k_output: 0.0006
          max_tokens: 128000
          use_case: "Lightweight tasks, classification"

    - name: google
      models:
        - id: gemini-2.5-flash
          name: Gemini 2.5 Flash
          cost_per_1k_input: 0.00015
          cost_per_1k_output: 0.0006
          max_tokens: 1000000
          use_case: "Multimodal, long context"

    - name: xiaomi
      models:
        - id: mimo-v2.5-pro
          name: MiMo v2.5 Pro
          cost_per_1k_input: 0.001
          cost_per_1k_output: 0.004
          max_tokens: 128000
          use_case: "Reasoning, math, coding — primary research model"

    - name: deepseek
      models:
        - id: deepseek-chat
          name: DeepSeek Chat
          cost_per_1k_input: 0.00014
          cost_per_1k_output: 0.00028
          max_tokens: 64000
          use_case: "Chinese NLP, cost-effective"

    - name: alibaba
      models:
        - id: qwen-max
          name: Qwen Max
          cost_per_1k_input: 0.004
          cost_per_1k_output: 0.012
          max_tokens: 32000
          use_case: "Chinese understanding, instruction following"

routing:
  default_provider: anthropic
  fallback_providers:
    - openai
    - google
  task_type_mapping:
    analysis: [anthropic, xiaomi, openai]
    code_generation: [xiaomi, openai, anthropic]
    chinese: [deepseek, alibaba]
    multimodal: [google, openai]
    reasoning: [xiaomi, anthropic]

token_budget:
  daily_limit: 200000000
  monthly_limit: 6000000000
  alert_threshold: 0.8

output:
  directory: ./output
  format: markdown
  save_raw: true
